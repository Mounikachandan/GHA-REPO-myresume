name: Build and Deploy to ECR and ECS

on:
  workflow_dispatch: 

# OIDC auth requires these two permissions
permissions:
  id-token: write
  contents: read

env:
  # Matching exact secret names from your GitHub repo (verified from old workflow)
  AWS_REGION:         ${{ secrets.AWS_REGION }}
  AWS_ROLE_ARN:       ${{ secrets.AWS_ROLE_ARN }}
  AWS_ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY:     ${{ secrets.ECR_REPOSITORY }}
  ECS_CLUSTER_NAME:   ${{ secrets.ECS_CLUSTER_NAME }}
  ECS_SERVICE_NAME:   ${{ secrets.ECS_SERVICE_NAME }}
  ECS_TASK_DEF_NAME:  ${{ secrets.ECS_TASK_DEF_NAME }}
  ECS_CONTAINER_NAME: ${{ secrets.ECS_CONTAINER_NAME }}
  IMAGE_TAG:          "v-${{ github.sha }}"

jobs:
  build-and-push:
    name: Build and push Docker image to ECR
    runs-on: ubuntu-latest

    outputs:
      image_uri: ${{ steps.set-image-uri.outputs.image_uri }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      # OIDC replaces long-lived AWS_ACCESS_KEY + AWS_SECRET_KEY.
      # Requires a trust policy on the IAM role for token.actions.githubusercontent.com.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region:       ${{ env.AWS_REGION }}
          role-to-assume:   ${{ env.AWS_ROLE_ARN }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
        with:
          mask-password: 'true'

      # Save ECR registry using step-level env: (avoids ${{ }} inside run: scripts)
      - name: Save ECR registry to env
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: echo "ECR_REGISTRY=$REGISTRY" >> $GITHUB_ENV

      - name: Build, tag and push to ECR
        run: |
          SHORT_TAG="v-${GITHUB_SHA::7}"
          FULL_URI="$ECR_REGISTRY/$ECR_REPOSITORY:$SHORT_TAG"

          echo "Building: $FULL_URI"
          docker build -t $FULL_URI .
          docker tag  $FULL_URI $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker push $FULL_URI
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

          # Save for next step
          echo "SHORT_TAG=$SHORT_TAG"   >> $GITHUB_ENV
          echo "FULL_URI=$FULL_URI"     >> $GITHUB_ENV

      - name: Set image URI as job output
        id: set-image-uri
        run: |
          echo "image_uri=$FULL_URI" >> $GITHUB_OUTPUT
          echo "Job output set: $FULL_URI"

  # ─────────────────────────────────────────────────────────────
  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push

    env:
      IMAGE_FULL_URI: ${{ needs.build-and-push.outputs.image_uri }}

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region:     ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}

      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition $ECS_TASK_DEF_NAME \
            --query taskDefinition \
            > task-def.json
          cat task-def.json

      - name: Update container image in task definition
        run: |
          jq --arg IMAGE "$IMAGE_FULL_URI" \
             --arg NAME  "$ECS_CONTAINER_NAME" \
             '
             .containerDefinitions |= map(
               if .name == $NAME then .image = $IMAGE else . end
             )
             | del(
               .taskDefinitionArn,
               .revision,
               .status,
               .requiresAttributes,
               .compatibilities,
               .registeredAt,
               .registeredBy
             )
             ' task-def.json > new-task-def.json

          echo "Updated task definition:"
          cat new-task-def.json


      - name: Render new task definition with updated image
        id: render-task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-def.json
          container-name:   ${{ env.ECS_CONTAINER_NAME }}
          image:            $IMAGE_FULL_URI  # ← never empty

      - name: Register new task definition
        id: register-task-def
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render-task-def.outputs.task-definition }}
          wait-for-service-stability: false # Set to true if you want the job to wait     


      - name: Update ECS service
        run: |
          aws ecs update-service \
            --cluster        $ECS_CLUSTER_NAME \
            --service        $ECS_SERVICE_NAME \
            --task-definition $NEW_TASK_DEF_ARN \
            --force-new-deployment

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster  $ECS_CLUSTER_NAME \
            --services $ECS_SERVICE_NAME
          echo "Deployment completed successfully."
